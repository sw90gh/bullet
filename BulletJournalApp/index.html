<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#2c2416" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>B·J Bullet Journal</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      *:focus, *:focus-visible, *:focus-within { outline: 2px solid transparent !important; outline-offset: 0 !important; }
      button { outline: none; -webkit-appearance: none; }
      button:focus, button:focus-visible { border-color: inherit !important; }
      input, select, textarea { outline: none; }
      input:focus, select:focus, textarea:focus { border-color: inherit !important; }
      button::-moz-focus-inner { border: 0; padding: 0; }
      html, body, #root { height: 100%; overflow: hidden; }
      body { background: #faf6f0; overscroll-behavior: none; }
      @media (prefers-color-scheme: dark) { body { background: #1a1612; } }
      ::-webkit-scrollbar { display: none; }
      .gantt-scroll::-webkit-scrollbar { display: block; height: 6px; }
      .gantt-scroll::-webkit-scrollbar-track { background: transparent; }
      .gantt-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 3px; }
      .gantt-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.4); }
      .gantt-scroll { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.2) transparent; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
      @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
      @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
